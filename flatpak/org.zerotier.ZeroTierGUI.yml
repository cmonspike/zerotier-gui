app-id: org.zerotier.ZeroTierGUI
runtime: org.kde.Platform
runtime-version: "6.7"
sdk: org.kde.Sdk
command: zerotier-gui
finish-args:
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=session-bus
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-config/zerotier-gui:create
  - --filesystem=~/.config/zerotier-gui:create
modules:
  - name: zerotier-gui
    buildsystem: simple
    build-commands:
      - python3 -m pip install --no-deps --prefix=/app .
      - install -Dm644 packaging/flatpak/org.zerotier.ZeroTierGUI.desktop /app/share/applications/org.zerotier.ZeroTierGUI.desktop
      - install -Dm644 packaging/flatpak/org.zerotier.ZeroTierGUI.metainfo.xml /app/share/metainfo/org.zerotier.ZeroTierGUI.metainfo.xml
      - install -Dm644 assets/zerotier-gui.svg /app/share/icons/hicolor/scalable/apps/org.zerotier.ZeroTierGUI.svg
    sources:
      - type: dir
        path: ..
